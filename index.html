<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍪</text></svg>">
<title>Crumble & Co — Cookie Widget Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── PAGE (simulates your website) ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: #F9F4EE;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #2A1505;
}

.page-mock {
  text-align: center;
  padding: 40px;
  opacity: 0.55;
  user-select: none;
}
.page-mock h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 700;
  letter-spacing: -1px;
  color: #2A1505;
  margin-bottom: 12px;
}
.page-mock p { font-size: 16px; color: #7A5030; max-width: 400px; margin: 0 auto; }
.page-badge {
  display: inline-block;
  background: #C47D2A;
  color: white;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
}
.hint {
  margin-top: 60px;
  font-size: 13px;
  color: #B88040;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
}

/* ─── CHAT WIDGET LAUNCHER ─── */
#launcher {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #C47D2A, #8B4A10);
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(196,125,42,0.45), 0 2px 8px rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  z-index: 1000;
  animation: launcherPop 0.6s 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes launcherPop {
  from { transform: scale(0) rotate(-90deg); opacity: 0; }
  to { transform: scale(1) rotate(0deg); opacity: 1; }
}
#launcher:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(196,125,42,0.55); }
#launcher.open { transform: scale(1) rotate(45deg); }
#launcher .badge {
  position: absolute;
  top: -2px; right: -2px;
  width: 18px; height: 18px;
  background: #E8534A;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  color: white;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #F9F4EE;
  animation: popIn 0.4s 1.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }

/* ─── WIDGET PANEL ─── */
#widget {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 380px;
  height: 600px;
  background: #1A0E05;
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(196,125,42,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 999;
  transform-origin: bottom right;
  transform: scale(0.8) translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
}
#widget.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: all;
}

/* Widget Header */
.w-header {
  background: linear-gradient(135deg, #2C1508 0%, #1A0E05 100%);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(196,125,42,0.15);
  flex-shrink: 0;
}
.w-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E8A84C, #C47D2A);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.w-avatar::after {
  content: '';
  position: absolute;
  bottom: 1px; right: 1px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #5BDB7A;
  border: 2px solid #1A0E05;
}
.w-info { flex: 1; }
.w-name {
  font-family: 'Cormorant Garamond', serif;
  color: #F5E6CC;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.w-sub {
  font-size: 11px;
  color: rgba(196,125,42,0.8);
  font-weight: 300;
  margin-top: 1px;
}
.w-close {
  background: rgba(255,255,255,0.06);
  border: none;
  color: rgba(245,230,204,0.6);
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
}
.w-close:hover { background: rgba(255,255,255,0.12); color: #F5E6CC; }

/* Tabs */
.w-tabs {
  display: flex;
  background: #12090200;
  border-bottom: 1px solid rgba(196,125,42,0.1);
  flex-shrink: 0;
}
.w-tab {
  flex: 1;
  padding: 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: rgba(245,230,204,0.4);
  background: none;
  border: none;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
  font-family: 'Outfit', sans-serif;
}
.w-tab.active { color: #E8A84C; }
.w-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: #E8A84C;
  border-radius: 2px 2px 0 0;
}

/* Tab panels */
.w-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.w-panel.active { display: flex; }

/* ─── CHAT PANEL ─── */
.w-chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(196,125,42,0.2) transparent;
}

.msg { display: flex; flex-direction: column; animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to { opacity: 1; transform: none; }
}
.msg.user { align-items: flex-end; }
.msg.bot { align-items: flex-start; }

.bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.55;
}
.msg.bot .bubble {
  background: rgba(255,255,255,0.07);
  color: #F0E0C8;
  border: 1px solid rgba(196,125,42,0.15);
  border-bottom-left-radius: 4px;
}
.msg.user .bubble {
  background: linear-gradient(135deg, #C47D2A, #9B5E14);
  color: #FDF6EC;
  border-bottom-right-radius: 4px;
}
.msg-time { font-size: 10px; color: rgba(245,230,204,0.25); margin-top: 3px; padding: 0 2px; }

/* Typing dots */
.dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(196,125,42,0.7);
  animation: dotBounce 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Quick replies */
.quick-replies {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
}
.qr {
  background: rgba(196,125,42,0.12);
  border: 1px solid rgba(196,125,42,0.35);
  color: #E8A84C;
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
  white-space: nowrap;
}
.qr:hover { background: rgba(196,125,42,0.25); transform: translateY(-1px); }

/* Chat input */
.w-input-bar {
  padding: 12px;
  border-top: 1px solid rgba(196,125,42,0.1);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.w-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(196,125,42,0.2);
  border-radius: 20px;
  padding: 10px 14px;
  color: #F0E0C8;
  font-size: 13px;
  outline: none;
  font-family: 'Outfit', sans-serif;
  transition: border-color 0.2s;
}
.w-input::placeholder { color: rgba(245,230,204,0.3); }
.w-input:focus { border-color: rgba(196,125,42,0.5); }
.w-send {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #C47D2A, #9B5E14);
  border: none; border-radius: 50%;
  color: white; font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, opacity 0.2s;
}
.w-send:hover { transform: scale(1.08); }
.w-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── PRODUCTS PANEL ─── */
.w-products {
  flex: 1; overflow-y: auto; padding: 14px;
  scrollbar-width: thin;
  scrollbar-color: rgba(196,125,42,0.2) transparent;
}

.prod-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(196,125,42,0.6);
  margin-bottom: 10px;
  margin-top: 4px;
}

.prod-grid { display: flex; flex-direction: column; gap: 10px; }
.prod-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(196,125,42,0.15);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
.prod-card:hover { background: rgba(196,125,42,0.08); border-color: rgba(196,125,42,0.35); transform: translateX(3px); }
.prod-card.featured { border-color: rgba(232,168,76,0.4); background: rgba(232,168,76,0.05); }
.prod-emoji { font-size: 32px; flex-shrink: 0; }
.prod-info { flex: 1; }
.prod-name { font-size: 14px; font-weight: 500; color: #F0E0C8; }
.prod-desc { font-size: 11px; color: rgba(245,230,204,0.45); margin-top: 2px; }
.prod-tags { display: flex; gap: 5px; margin-top: 5px; }
.prod-tag {
  font-size: 10px; padding: 2px 8px;
  background: rgba(196,125,42,0.15);
  color: rgba(196,125,42,0.9);
  border-radius: 10px;
}
.prod-right { text-align: right; flex-shrink: 0; }
.prod-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: #E8A84C; }
.prod-add {
  margin-top: 6px;
  background: rgba(196,125,42,0.2);
  border: 1px solid rgba(196,125,42,0.4);
  color: #E8A84C;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all 0.2s;
  white-space: nowrap;
}
.prod-add:hover { background: rgba(196,125,42,0.4); }
.prod-add.added { background: rgba(91,219,122,0.15); border-color: rgba(91,219,122,0.4); color: #5BDB7A; }

/* Cart bar */
.cart-bar {
  margin: 10px 14px 14px;
  background: linear-gradient(135deg, #C47D2A, #8B4A10);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.cart-bar:hover { opacity: 0.9; }
.cart-bar-left { font-size: 13px; color: rgba(255,255,255,0.85); }
.cart-bar-left strong { color: white; }
.cart-bar-right { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: white; }
.cart-bar.hidden { display: none; }

/* ─── TRACK PANEL ─── */
.w-track { flex: 1; padding: 20px 14px; overflow-y: auto; }

.track-input-group { margin-bottom: 16px; }
.track-label { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: rgba(196,125,42,0.7); margin-bottom: 8px; }
.track-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(196,125,42,0.25);
  border-radius: 10px;
  padding: 11px 14px;
  color: #F0E0C8;
  font-size: 13px;
  outline: none;
  font-family: 'Outfit', sans-serif;
  transition: border-color 0.2s;
}
.track-input:focus { border-color: rgba(196,125,42,0.55); }
.track-input::placeholder { color: rgba(245,230,204,0.25); }
.track-btn {
  width: 100%;
  background: linear-gradient(135deg, #C47D2A, #8B4A10);
  border: none; border-radius: 10px;
  color: white; font-size: 14px; font-weight: 500;
  padding: 13px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: opacity 0.2s, transform 0.15s;
  margin-bottom: 20px;
}
.track-btn:hover { opacity: 0.9; transform: translateY(-1px); }

.track-result { display: block; min-height: 0; }
.order-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(196,125,42,0.2);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}
.order-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.order-id { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #E8A84C; font-weight: 600; }
.order-date { font-size: 11px; color: rgba(245,230,204,0.4); margin-top: 2px; }
.status-pill {
  font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  background: rgba(91,219,122,0.12);
  color: #5BDB7A;
  border: 1px solid rgba(91,219,122,0.25);
}
.status-pill.baking { background: rgba(232,168,76,0.12); color: #E8A84C; border-color: rgba(232,168,76,0.25); }

/* Timeline */
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-step { display: flex; gap: 12px; }
.tl-left { display: flex; flex-direction: column; align-items: center; }
.tl-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(196,125,42,0.3);
  background: #1A0E05;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  transition: all 0.4s;
}
.tl-dot.done { background: #C47D2A; border-color: #C47D2A; color: white; }
.tl-dot.active { background: #E8A84C; border-color: #E8A84C; color: white; animation: glow 2s infinite; }
@keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(232,168,76,0.4)} 50%{box-shadow:0 0 0 6px rgba(232,168,76,0)} }
.tl-line { width: 2px; flex: 1; background: rgba(196,125,42,0.15); margin: 2px 0; min-height: 20px; }
.tl-line.done { background: rgba(196,125,42,0.5); }
.tl-content { padding-bottom: 16px; padding-top: 1px; }
.tl-title { font-size: 13px; font-weight: 500; color: #F0E0C8; }
.tl-sub { font-size: 11px; color: rgba(245,230,204,0.4); margin-top: 2px; }

.order-items { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(196,125,42,0.1); }
.order-item { display: flex; justify-content: space-between; font-size: 12.5px; color: rgba(245,230,204,0.7); margin-bottom: 5px; }
.order-total-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #E8A84C; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(196,125,42,0.12); }

.track-demo-hint {
  text-align: center;
  font-size: 12px;
  color: rgba(196,125,42,0.5);
  margin-top: -10px;
  margin-bottom: 12px;
}

/* Scrollbars */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(196,125,42,0.2); border-radius: 4px; }

/* ─── CART PANEL ─── */
.w-cart {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(196,125,42,0.2) transparent;
}
.cart-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(245,230,204,0.3);
  font-size: 13px;
  gap: 10px;
  padding: 40px 20px;
  text-align: center;
}
.cart-empty-icon { font-size: 40px; opacity: 0.4; }
.cart-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(196,125,42,0.15);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: msgIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.cart-item-emoji { font-size: 26px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 13px; font-weight: 500; color: #F0E0C8; }
.cart-item-price { font-size: 12px; color: rgba(196,125,42,0.8); margin-top: 2px; }
.cart-item-qty {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.qty-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid rgba(196,125,42,0.35);
  background: rgba(196,125,42,0.1);
  color: #E8A84C;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  line-height: 1;
}
.qty-btn:hover { background: rgba(196,125,42,0.3); }
.qty-num { font-size: 14px; font-weight: 600; color: #F0E0C8; min-width: 18px; text-align: center; }
.cart-divider {
  border: none;
  border-top: 1px solid rgba(196,125,42,0.1);
  margin: 4px 0;
}
.cart-summary {
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 12px 14px;
}
.cart-summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(245,230,204,0.55);
  margin-bottom: 5px;
}
.cart-summary-total {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 600;
  color: #E8A84C;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(196,125,42,0.15);
}
.cart-checkout-bar {
  padding: 12px 14px;
  border-top: 1px solid rgba(196,125,42,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.cart-checkout-info { display: flex; flex-direction: column; gap: 2px; font-size: 12px; color: rgba(245,230,204,0.5); }
.cart-checkout-btn {
  background: linear-gradient(135deg, #C47D2A, #8B4A10);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 18px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: opacity 0.2s, transform 0.15s;
}
.cart-checkout-btn:hover { opacity: 0.9; transform: translateY(-1px); }


.track-not-found {
  background: rgba(232,83,74,0.1);
  border: 1px solid rgba(232,83,74,0.25);
  border-radius: 12px;
  padding: 14px;
  font-size: 13px;
  color: rgba(245,230,204,0.7);
  line-height: 1.6;
}

/* ─── MOBILE RESPONSIVE ─── */
@media (max-width: 480px) {
  #widget {
    bottom: 0 !important;
    right: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 92vh !important;
    border-radius: 20px 20px 0 0 !important;
    transform-origin: bottom center !important;
  }
  #launcher {
    bottom: 16px;
    right: 16px;
  }
  .w-chat { padding: 10px 12px; }
  .bubble { max-width: 88%; font-size: 13px; }
  .w-input-bar { padding: 10px 12px 14px; }
  .w-header { padding: 14px 16px; }
  .w-tabs { overflow-x: auto; }
  .w-tab { font-size: 10px; padding: 10px 8px; }
}

/* ─── PAYMENT SCREEN ─── */
.payment-screen {

  border: 1px solid rgba(196,125,42,0.2);
  border-radius: 16px;
  padding: 16px;
  margin-top: 8px;
  max-width: 92%;
}
.payment-title {
  font-family: 'Cormorant Garamond', serif;

}

  background: rgba(91,219,122,0.1);

}
.payment-amount-label { font-size: 11px; color: rgba(245,230,204,0.5); margin-bottom: 3px; }

.payment-tab {

.payment-pane.active { display: block; }
.qr-wrap { text-align: center; padding: 8px 0; }
.qr-wrap img { width: 160px; height: 160px; border-radius: 10px; border: 2px solid rgba(196,125,42,0.2); }
.qr-hint { font-size: 11px; color: rgba(245,230,204,0.45); margin-top: 8px; }
.snap-btn {
  display: block; width: 100%; margin-top: 10px;
  background: #3a7bd5; border: none; border-radius: 10px;
  color: white; font-size: 13px; font-weight: 600;
  padding: 10px; cursor: pointer; font-family: 'Outfit', sans-serif;

}
.snap-btn:hover { opacity: 0.88; }
.eft-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid rgba(196,125,42,0.08);
  font-size: 13px;
}
.eft-row:last-child { border-bottom: none; }
.eft-label { color: rgba(245,230,204,0.45); font-size: 12px; }
.eft-value { color: #F0E0C8; font-weight: 500; text-align: right; }
.eft-ref { color: #E8A84C; font-weight: 600; }
.payment-note {
  margin-top: 12px; font-size: 11px; color: rgba(245,230,204,0.4);
  text-align: center; line-height: 1.5;
}

</style>
</head>
<body>

<!-- Simulated website background -->
<div class="page-mock">
  <div class="page-badge">Artisan Cookies · Cape Town</div>
  <h1>Crumble & Co</h1>
  <p>Handcrafted cookies, baked fresh to order. Every bite tells a story.</p>
</div>
<div class="hint">
  <span>🍪</span> Try the chat widget in the bottom right corner
</div>

<!-- ─── LAUNCHER BUTTON ─── -->
<button id="launcher" onclick="toggleWidget()" title="Chat with us">
  <span id="launcherIcon">🍪</span>
  <div class="badge" id="notifBadge">1</div>
</button>

<!-- ─── WIDGET ─── -->
<div id="widget">

  <!-- Header -->
  <div class="w-header">
    <div class="w-avatar">🍪</div>
    <div class="w-info">
      <div class="w-name">Crumble & Co</div>
      <div class="w-sub">Cookie Assistant · Replies instantly</div>
    </div>
    <button class="w-close" onclick="toggleWidget()">✕</button>
  </div>

  <!-- Tabs -->
  <div class="w-tabs">
    <button class="w-tab active" onclick="switchTab('chat', this)">💬 Chat</button>
    <button class="w-tab" onclick="switchTab('products', this)">🍪 Menu</button>
    <button class="w-tab" id="cartTab" onclick="switchTab('cart', this)">🛒 Cart</button>
    <button class="w-tab" onclick="switchTab('track', this)">📦 Track</button>
  </div>

  <!-- ─── CHAT TAB ─── -->
  <div class="w-panel active" id="tab-chat">
    <div class="w-chat" id="chatMessages"></div>
    <div class="w-input-bar">
      <input class="w-input" id="chatInput" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="w-send" id="sendBtn" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <!-- ─── PRODUCTS TAB ─── -->
  <div class="w-panel" id="tab-products">
    <div class="w-products" id="productList">
      <div class="prod-section-label">Today's Menu</div>
      <div class="prod-grid" id="prodGrid"></div>
    </div>
    <div class="cart-bar hidden" id="cartBar" onclick="goToCart()">
      <div class="cart-bar-left">🛒 <strong id="cartCount">0</strong> items in cart</div>
      <div class="cart-bar-right">R<span id="cartTotal">0</span></div>
    </div>
  </div>

  <!-- ─── TRACK TAB ─── -->
  <div class="w-panel" id="tab-track">
    <div class="w-track">
      <div class="track-input-group">
        <div class="track-label">Order Number</div>
        <input class="track-input" id="trackId" placeholder="e.g. CC-62920" />
      </div>
      <div class="track-input-group">
        <div class="track-label">Your Email</div>
        <input class="track-input" id="trackEmail" placeholder="you@email.com" />
      </div>
      <button class="track-btn" onclick="trackOrder()">Track My Order →</button>
      <div class="track-result" id="trackResult"></div>
    </div>
  </div>

  <!-- ─── CART TAB ─── -->
  <div class="w-panel" id="tab-cart">
    <div class="w-cart" id="cartPanel"></div>
    <div class="cart-checkout-bar" id="cartCheckoutBar">
      <div class="cart-checkout-info">
        <span id="cartCheckoutCount">0 items</span>
        <span id="cartCheckoutTotal" style="color:#E8A84C;font-weight:600;">R0</span>
      </div>
      <button class="cart-checkout-btn" onclick="goToCart()">Checkout →</button>
    </div>
  </div>

</div>

<script>
/* ─── GOOGLE SHEETS ─── */
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzWX4DMuMriUsWelhXzZo9xegH9Ee0A1XIz0lQ6MTNqqynHxZVzuGfgyGZeMd58jEL2/exec";

/* ─── DATA ─── */
const MENU = [
  { id: 1, name: "Classic Choc Chip", price: 25, emoji: "🍫", desc: "Golden, gooey & timeless", tags: ["Bestseller"], featured: true },
  { id: 2, name: "Salted Caramel Crunch", price: 28, emoji: "🍯", desc: "Toffee bits & fleur de sel", tags: ["Popular"] },
  { id: 3, name: "Red Velvet Dream", price: 30, emoji: "❤️", desc: "Cream cheese swirl inside", tags: ["Premium"] },
  { id: 4, name: "Lemon Zest Burst", price: 26, emoji: "🍋", desc: "Bright citrus glaze", tags: ["Light"] },
  { id: 5, name: "Double Dark Choc", price: 30, emoji: "🖤", desc: "Dark & white chocolate layers", tags: ["Indulgent"] },
  { id: 6, name: "Peanut Butter Bliss", price: 27, emoji: "🥜", desc: "Rich & chunky", tags: [] },
];

let cart = {};
let chatHistory = [];
let widgetOpen = false;
let isBusy = false;
let greeted = false;
let checkoutStep = null;
let checkoutData = {};

/* ─── WIDGET TOGGLE ─── */
function toggleWidget() {
  widgetOpen = !widgetOpen;
  document.getElementById('widget').classList.toggle('open', widgetOpen);
  document.getElementById('launcher').style.display = widgetOpen ? 'none' : 'flex';
  document.getElementById('notifBadge').style.display = 'none';

  if (widgetOpen && !greeted) {
    greeted = true;
    setTimeout(() => {
      addBotMsg("Hi there! 👋 I'm your Crumble & Co assistant. I can help you **place an order**, find the perfect cookie, or **track your delivery**. What brings you in today?", [
        "Show me what's popular 🍪",
        "I'd like to place an order",
        "Track my order 📦"
      ]);
    }, 400);
  }
}

/* ─── TABS ─── */
function switchTab(name, btn) {
  document.querySelectorAll('.w-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.w-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

/* ─── CHAT ─── */
function nowTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function addBotMsg(text, qrs = []) {
  const chat = document.getElementById('chatMessages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = nowTime();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  if (qrs.length) {
    const qrRow = document.createElement('div');
    qrRow.className = 'quick-replies';
    qrs.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'qr';
      btn.textContent = q;
      btn.onclick = () => { qrRow.remove(); sendAsUser(q); };
      qrRow.appendChild(btn);
    });
    wrap.appendChild(qrRow);
  }
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  const chat = document.getElementById('chatMessages');
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = nowTime();
  wrap.appendChild(time);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chatMessages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function sendAsUser(text) {
  document.getElementById('chatInput').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isBusy) return;

  addUserMsg(text);
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  isBusy = true;

  const lower = text.toLowerCase();

  // Checkout flow intercept
  if (checkoutStep && checkoutStep !== 'confirm') {
    showTyping();
    await new Promise(r => setTimeout(r, 500));
    removeTyping();
    handleCheckoutReply(text);
    isBusy = false; document.getElementById('sendBtn').disabled = false;
    return;
  }
  if (checkoutStep === 'confirm') {
    if (lower.includes('yes') || lower.includes('confirm') || lower.includes('✓')) {
      showTyping();
      await submitOrder();
      removeTyping();
    } else {
      checkoutStep = null;
      addBotMsg("No problem! Adjust your cart in the Menu tab, then tap the cart bar when ready. 🛒");
    }
    isBusy = false; document.getElementById('sendBtn').disabled = false;
    return;
  }

  // Smart scripted bot
  showTyping();
  await new Promise(r => setTimeout(r, 500 + Math.random() * 500));
  removeTyping();

  const reply = getBotReply(lower);
  if (reply.text) addBotMsg(reply.text, reply.qrs || []);

  isBusy = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}


function match(lower, keywords) {
  return keywords.some(k => lower.includes(k));
}

function getBotReply(lower) {
  // Menu
  if (match(lower, ['menu','what do you','what cookies','show me','flavours','flavors','what have you got','your range'])) {
    setTimeout(() => switchTab('products', document.querySelectorAll('.w-tab')[1]), 400);
    return { text: "Here is our full menu! I've opened the Menu tab for you. Tap any cookie to add it to your cart. Ready to checkout when you are!", qrs: ["Box deals?","Custom orders?","Delivery info"] };
  }
  // Recommendations
  if (match(lower, ['recommend','best','popular','favourite','favorite','what should i','help me choose','not sure','which one','suggestion'])) {
    return { text: "Our bestseller is the Classic Choc Chip — golden and gooey, always a winner. For something fancier try the Salted Caramel Crunch. For something bold, the Double Dark Choc is amazing. What is the occasion?", qrs: ["It's a gift","Just for me","For a party"] };
  }
  // Gifts
  if (match(lower, ['gift','birthday','anniversary','wedding','corporate','present','special','someone'])) {
    return { text: "Cookies make the best gifts! Our gift boxes are beautifully packaged. 6-pack at R150, 12-pack at R280, or 24-pack at R520. We can add custom messages too!", qrs: ["Add 6-pack to cart","Add 12-pack to cart","Place an order"] };
  }
  // Party / bulk
  if (match(lower, ['party','event','bulk','many','catering','function','lot of'])) {
    return { text: "We love catering for events! Our 24-pack at R520 is perfect for groups. For larger orders we need 3 days notice. What date is your event?", qrs: ["Place an order","Custom orders?"] };
  }
  // Box deals
  if (match(lower, ['box','pack','deal','bundle','dozen'])) {
    return { text: "Our box deals: 6-pack for R150, 12-pack for R280, and 24-pack for R520. All beautifully packaged. Want to add one to your cart?", qrs: ["Add 6-pack to cart","Add 12-pack to cart","Add 24-pack to cart"] };
  }
  // Add boxes
  if (match(lower, ['add 6','6-pack','6 pack'])) { addToCart(99,'6-Pack Gift Box',150); return { text: "Added a 6-Pack Gift Box (R150) to your cart! Ready to order?", qrs: ["Ready to order","Keep browsing"] }; }
  if (match(lower, ['add 12','12-pack','12 pack'])) { addToCart(98,'12-Pack Gift Box',280); return { text: "Added a 12-Pack Gift Box (R280) to your cart! Ready to order?", qrs: ["Ready to order","Keep browsing"] }; }
  if (match(lower, ['add 24','24-pack','24 pack'])) { addToCart(97,'24-Pack Gift Box',520); return { text: "Added a 24-Pack Gift Box (R520) to your cart! Ready to order?", qrs: ["Ready to order","Keep browsing"] }; }
  // Pricing
  if (match(lower, ['price','cost','how much','rand','cheap','expensive','pricing'])) {
    return { text: "Our cookies are R25 to R30 each. Box deals: 6-pack R150, 12-pack R280, 24-pack R520. Delivery is R35 flat and free for orders over R300.", qrs: ["See the menu","Order now"] };
  }
  // Delivery
  if (match(lower, ['deliver','delivery','shipping','how long','when','days','turnaround'])) {
    return { text: "We deliver anywhere in Cape Town for R35, free over R300. Orders are baked fresh within 24 to 48 hours after payment. We will WhatsApp you when it is on the way!", qrs: ["Place an order","Pickup option?"] };
  }
  // Pickup
  if (match(lower, ['pickup','pick up','collect','collection','woodstock','fetch'])) {
    return { text: "Pickup is free from our kitchen in Woodstock! We will WhatsApp you when your order is ready, usually 24 to 48 hours after payment.", qrs: ["Place an order","Delivery info"] };
  }
  // Location
  if (match(lower, ['where','location','address','find you','based'])) {
    return { text: "We are a home bakery based in Woodstock, Cape Town. All orders are for delivery or arranged pickup. The pickup address is shared once your order is confirmed.", qrs: ["Place an order","Delivery options"] };
  }
  // Payment
  if (match(lower, ['pay','payment','eft','snapscan','bank','transfer','cash','how to pay'])) {
    return { text: "We accept SnapScan (instant QR payment) and EFT bank transfer. Both are free for you! Payment details appear automatically after you confirm your order.", qrs: ["Place an order","What is SnapScan?"] };
  }
  // Custom
  if (match(lower, ['custom','personalise','personalize','special order','logo','branded','message'])) {
    return { text: "We love custom orders! Personalised packaging, custom messages, branded boxes — all doable with at least 3 days notice. Tell us what you need!", qrs: ["Place an order","Gift boxes"] };
  }
  // Allergies
  if (match(lower, ['allerg','nut','gluten','dairy','vegan','halal','intoleran','diet','ingredient'])) {
    return { text: "All our cookies are made in a kitchen with nuts, gluten, and dairy so we cannot guarantee allergen-free products at this stage. Message us directly if you have specific needs!", qrs: ["Place an order anyway"] };
  }
  // Hours
  if (match(lower, ['hours','open','available','today','weekend'])) {
    return { text: "We take orders 7 days a week! Baking happens within 24 to 48 hours after payment, Monday to Saturday.", qrs: ["Place an order","Delivery info"] };
  }
  // Order / checkout
  if (match(lower, ['order','buy','purchase','i want','id like','place','checkout','ready to order','keep browsing'])) {
    if (cartCount() > 0) { startCheckout(); return { text: "", qrs: [] }; }
    setTimeout(() => switchTab('products', document.querySelectorAll('.w-tab')[1]), 400);
    return { text: "Let us get you sorted! I have opened the Menu tab. Add your cookies then tap the cart bar to checkout.", qrs: [] };
  }
  // View cart
  if (match(lower, ['view cart','my cart','show cart','what is in my cart','whats in my cart','see my cart'])) {
    viewCart();
    return { text: "Opening your cart! You can adjust quantities there or tap Checkout when ready.", qrs: [] };
  }
  // Track
  if (match(lower, ['track','where is my','order status','delivery status'])) {
    setTimeout(() => switchTab('track', document.querySelectorAll('.w-tab')[3]), 400);
    return { text: "Opening the Track tab! Enter your order number and email — both are in your confirmation email.", qrs: [] };
  }
  // Greetings
  if (match(lower, ['hi','hello','hey','howzit','hiya','good morning','good afternoon','sup','yo'])) {
    return { text: "Howzit! Welcome to Crumble and Co! I can help with our menu, placing an order, or tracking a delivery. What can I do for you?", qrs: ["See the menu","Place an order","Track my order"] };
  }
  // Thanks
  if (match(lower, ['thank','thanks','dankie','appreciate','great','awesome','perfect'])) {
    return { text: "You are welcome! Anything else I can help with?", qrs: ["See the menu","Place an order"] };
  }
  // Contact
  if (match(lower, ['whatsapp','contact','call','speak','human','person','real person'])) {
    return { text: "Place your order here and we will follow up on WhatsApp with payment details. Or message us directly if you need something special!", qrs: ["Place an order"] };
  }
  // Fallback
  return { text: "I can help with our menu, pricing, delivery, placing an order, or tracking an existing one. What would you like to know?", qrs: ["See the menu","Pricing","Delivery info","Place an order"] };
}


function renderCart() {
  const panel = document.getElementById('cartPanel');
  const items = Object.entries(cart).filter(([,v]) => v.qty > 0);

  if (items.length === 0) {
    panel.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div>Your cart is empty</div><div style="font-size:11px;margin-top:4px">Browse the Menu tab to add cookies!</div></div>';
    document.getElementById('cartCheckoutBar').style.display = 'none';
    return;
  }

  document.getElementById('cartCheckoutBar').style.display = 'flex';
  const subtotal = cartTotal();
  const delivery = subtotal >= 300 ? 0 : 35;
  const total = subtotal + delivery;

  // Find emoji for item
  const emojiMap = {};
  MENU.forEach(m => { emojiMap[m.name] = m.emoji; });
  emojiMap['6-Pack Gift Box'] = '📦';
  emojiMap['12-Pack Gift Box'] = '📦';
  emojiMap['24-Pack Gift Box'] = '📦';

  let html = '';
  items.forEach(([name, v]) => {
    html += `
      <div class="cart-item" id="cartitem-${name.replace(/\s/g,'_')}">
        <div class="cart-item-emoji">${emojiMap[name] || '🍪'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${name}</div>
          <div class="cart-item-price">R${v.price} each · R${v.price * v.qty} total</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty('${name}', -1)">−</button>
          <span class="qty-num">${v.qty}</span>
          <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
        </div>
      </div>`;
  });

  html += `<hr class="cart-divider">
    <div class="cart-summary">
      <div class="cart-summary-row"><span>Subtotal</span><span>R${subtotal}</span></div>
      <div class="cart-summary-row"><span>Delivery</span><span>${delivery === 0 ? 'Free!' : 'R' + delivery}</span></div>
      ${delivery > 0 ? `<div class="cart-summary-row" style="font-size:11px;opacity:0.6"><span>Free delivery over R300</span><span>R${300 - subtotal} away</span></div>` : ''}
      <div class="cart-summary-total"><span>Total</span><span>R${total}</span></div>
    </div>`;

  panel.innerHTML = html;

  // Update checkout bar
  const count = cartCount();
  document.getElementById('cartCheckoutCount').textContent = count + ' item' + (count !== 1 ? 's' : '');
  document.getElementById('cartCheckoutTotal').textContent = 'R' + total;
}

function changeQty(name, delta) {
  if (!cart[name]) return;
  cart[name].qty += delta;
  if (cart[name].qty <= 0) delete cart[name];
  updateCartBar();
  renderCart();
}

/* ─── PRODUCTS ─── */
function buildProducts() {
  const grid = document.getElementById('prodGrid');
  MENU.forEach(item => {
    const card = document.createElement('div');
    card.className = 'prod-card' + (item.featured ? ' featured' : '');
    card.innerHTML = `
      <div class="prod-emoji">${item.emoji}</div>
      <div class="prod-info">
        <div class="prod-name">${item.name}</div>
        <div class="prod-desc">${item.desc}</div>
        <div class="prod-tags">${item.tags.map(t=>`<span class="prod-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="prod-right">
        <div class="prod-price">R${item.price}</div>
        <button class="prod-add" id="add-${item.id}" onclick="addToCart(${item.id},'${item.name}',${item.price})">+ Add</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function addToCart(id, name, price) {
  if (!cart[name]) cart[name] = { price, qty: 0 };
  cart[name].qty++;
  updateCartBar();
  const btn = document.getElementById('add-' + id);
  btn.textContent = '✓ Added';
  btn.classList.add('added');
  setTimeout(() => {
    btn.textContent = '+ Add';
    btn.classList.remove('added');
  }, 1500);
}

function cartTotal() {
  return Object.values(cart).reduce((s, v) => s + v.price * v.qty, 0);
}
function cartCount() {
  return Object.values(cart).reduce((s, v) => s + v.qty, 0);
}

function updateCartBar() {
  const bar = document.getElementById('cartBar');
  const count = cartCount();
  if (count === 0) { bar.classList.add('hidden'); } 
  else {
    bar.classList.remove('hidden');
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartTotal').textContent = cartTotal();
  }
  // Update cart tab label
  const cartTabBtn = document.getElementById('cartTab');
  if (cartTabBtn) cartTabBtn.textContent = count > 0 ? '🛒 Cart (' + count + ')' : '🛒 Cart';
  renderCart();
}

/* Checkout state is declared above */

function goToCart() {
  if (cartCount() === 0) return;
  // If triggered from cart panel checkout button, go to chat checkout
  switchTab('chat', document.querySelectorAll('.w-tab')[0]);
  startCheckout();
}

function viewCart() {
  renderCart();
  switchTab('cart', document.getElementById('cartTab'));
}

function startCheckout() {
  checkoutData = {};
  checkoutStep = 'name';
  const items = Object.entries(cart).map(([n,v]) => `${v.qty}× ${n}`).join(', ');
  const total = cartTotal();
  addBotMsg(`Great choices! 🛒 Your cart: ${items} — R${total} total.\n\nLet's get your order sorted. What's your name?`);
}

function handleCheckoutReply(text) {
  if (checkoutStep === 'name') {
    checkoutData.name = text;
    checkoutStep = 'phone';
    addBotMsg(`Lovely, ${text}! 🍪 What's your WhatsApp number so we can send you updates?`);
    return true;
  }
  if (checkoutStep === 'phone') {
    checkoutData.phone = text;
    checkoutStep = 'email';
    addBotMsg(`Got it! And your email address? We'll send a confirmation receipt there. 📧`);
    return true;
  }
  if (checkoutStep === 'email') {
    checkoutData.email = text;
    checkoutStep = 'delivery';
    addBotMsg(`Perfect! Do you want delivery (R35, free over R300) or will you collect from Woodstock?`, ['Delivery please 🚗', "I'll collect 🏪"]);
    return true;
  }
  if (checkoutStep === 'delivery') {
    const isDelivery = text.toLowerCase().includes('deliver');
    checkoutData.delivery = isDelivery ? 'Delivery' : 'Pickup';
    if (isDelivery) {
      checkoutStep = 'address';
      addBotMsg(`Perfect! What's your delivery address in Cape Town?`);
    } else {
      checkoutData.address = 'Pickup – Woodstock';
      checkoutStep = 'confirm';
      showOrderConfirmation();
    }
    return true;
  }
  if (checkoutStep === 'address') {
    checkoutData.address = text;
    checkoutStep = 'confirm';
    showOrderConfirmation();
    return true;
  }
  return false;
}

function showOrderConfirmation() {
  const items = Object.entries(cart).map(([n,v]) => `${v.qty}× ${n}`).join(', ');
  const subtotal = cartTotal();
  const deliveryFee = checkoutData.delivery === 'Delivery' && subtotal < 300 ? 35 : 0;
  const total = subtotal + deliveryFee;
  checkoutData.items = items;
  checkoutData.total = `R${total}`;

  const summary = `📋 Order summary:\n• ${items}\n• ${checkoutData.delivery} ${checkoutData.address !== 'Pickup – Woodstock' ? '→ ' + checkoutData.address : '(Woodstock)'}\n• ${deliveryFee > 0 ? 'Delivery: R35\n• ' : ''}Total: R${total}\n• Confirmation to: ${checkoutData.email}\n\nShall I confirm this order?`;
  addBotMsg(summary, ['Yes, confirm! ✓', 'No, let me change something']);
}

async function submitOrder() {
  checkoutStep = null;
  addBotMsg('Placing your order… 🍪');
  try {
    // Generate order number ONCE here — used in both the Sheet and localStorage
    const orderNum = 'CC-' + Math.floor(10000 + Math.random() * 90000);
    const timestamp = new Date().toLocaleString('en-ZA');
    checkoutData.orderNum = orderNum;
    checkoutData.timestamp = timestamp;

    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(checkoutData)
    });

    cart = {};
    updateCartBar();
    const savedOrder = {...checkoutData};
    savedOrder.status = 'New';
    savedOrder.email = savedOrder.email || '';

    // Save to localStorage using the SAME order number shown to customer
    try {
      const orders = JSON.parse(localStorage.getItem('cc_orders') || '{}');
      orders[orderNum] = savedOrder;
      localStorage.setItem('cc_orders', JSON.stringify(orders));
    } catch(e) {}

    checkoutData = {};
    addBotMsg('Order confirmed, ' + savedOrder.name + '! Your order number is ' + orderNum + '. A confirmation email is heading to ' + savedOrder.email + '. Please complete payment below to start your order!');
    showPaymentScreen(savedOrder);
  } catch(e) {
    addBotMsg('Oops, something went wrong submitting the order. Please try again or WhatsApp us directly!');
  }
}

function switchPayTab(tab, btn) {
  document.querySelectorAll('.payment-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.payment-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + tab).classList.add('active');
}

/* ─── TRACKING ─── */
function trackOrder() {
  const id    = document.getElementById('trackId').value.trim().toUpperCase();
  const email = document.getElementById('trackEmail').value.trim().toLowerCase();
  const result = document.getElementById('trackResult');

  if (!id)    { result.classList.add('show'); result.innerHTML = '<p style="color:rgba(245,230,204,0.5);font-size:13px;padding:10px 0">Please enter your order number.</p>'; return; }
  if (!email) { result.classList.add('show'); result.innerHTML = '<p style="color:rgba(245,230,204,0.5);font-size:13px;padding:10px 0">Please enter your email address.</p>'; return; }

  // Look up in localStorage (orders placed on this device)
  let order = null;
  try {
    const orders = JSON.parse(localStorage.getItem('cc_orders') || '{}');
    const match = orders[id];
    if (match && match.email && match.email.toLowerCase() === email) {
      order = match;
    }
  } catch(e) {}

  if (!order) {
    result.classList.add('show');
  result.innerHTML = '<div class="track-not-found">No order found for <strong>' + id + '</strong> with that email.<br><br>Orders can only be tracked on the device they were placed from. Check your confirmation email for your order details.</div>';
    return;
  }

  const statusSteps = ['Order Confirmed', 'Payment Pending', 'Baking in Progress', 'Quality Check & Packing', 'Out for Delivery / Ready to Collect'];
  const statusMap = { 'New': 0, 'Confirmed': 1, 'Paid': 1, 'Baking': 2, 'Packing': 3, 'Delivered': 4, 'Ready': 4 };
  const currentStep = statusMap[order.status] !== undefined ? statusMap[order.status] : 0;
  const stepEmoji = ['📋', '💳', '🔥', '📦', '🚗'];

  let timelineHTML = '';
  statusSteps.forEach((step, i) => {
    const done   = i < currentStep;
    const active = i === currentStep;
    const isLast = i === statusSteps.length - 1;
    timelineHTML += '<div class="tl-step">' +
      '<div class="tl-left">' +
        '<div class="tl-dot ' + (done ? 'done' : active ? 'active' : '') + '">' + (done ? '✓' : active ? stepEmoji[i] : '') + '</div>' +
        (!isLast ? '<div class="tl-line ' + (done ? 'done' : '') + '"></div>' : '') +
      '</div>' +
      '<div class="tl-content">' +
        '<div class="tl-title">' + step + '</div>' +
        '<div class="tl-sub" style="' + (active ? 'color:#E8A84C' : '') + '">' + (done ? 'Done' : active ? 'In progress' : 'Pending') + '</div>' +
      '</div></div>';
  });

  result.classList.add('show');
  result.innerHTML =
    '<div class="order-card">' +
      '<div class="order-card-header">' +
        '<div><div class="order-id">' + order.orderNum + '</div><div class="order-date">Placed ' + order.timestamp + '</div></div>' +
        '<div class="status-pill baking">' + (order.status || 'New') + '</div>' +
      '</div>' +
      '<div class="timeline">' + timelineHTML + '</div>' +
      '<div class="order-items">' +
        '<div class="order-item"><span>' + (order.items || '') + '</span><span>' + (order.total || '') + '</span></div>' +
        '<div class="order-item"><span>' + (order.delivery || '') + '</span><span>' + (order.address || '') + '</span></div>' +
        '<div class="order-total-row"><span>Total</span><span>' + (order.total || '') + '</span></div>' +
      '</div>' +
    '</div>';

  result.scrollIntoView({ behavior: 'smooth' });
}
